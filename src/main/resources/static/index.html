<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>zipMEin - Secure File Upload</title>
  <style>
    :root {
      --bg-primary: #050505;
      --bg-surface: #0f0f0f;
      --bg-elevated: #121212;
      --bg-muted: #171717;
      --text-primary: #ffffff;
      --text-secondary: #a3a3a3;
      --text-muted: #737373;
      --border-primary: #262626;
      --border-secondary: #3a3a3a;
      --border-focus: #ffffff;
      --focus-ring: rgba(255, 255, 255, 0.16);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.28);
      --shadow-lift: 0 10px 28px rgba(0, 0, 0, 0.36);
    }

    body.light-theme {
      --bg-primary: #f7f7f7;
      --bg-surface: #ffffff;
      --bg-elevated: #fafafa;
      --bg-muted: #f2f2f2;
      --text-primary: #101010;
      --text-secondary: #404040;
      --text-muted: #666666;
      --border-primary: #dddddd;
      --border-secondary: #d0d0d0;
      --border-focus: #101010;
      --focus-ring: rgba(16, 16, 16, 0.12);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.08);
      --shadow-lift: 0 10px 24px rgba(0, 0, 0, 0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      line-height: 1.55;
      letter-spacing: 0.01em;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .theme-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      min-width: 44px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--border-secondary);
      border-radius: 999px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 20;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .theme-toggle:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
    }

    .install-btn {
      position: fixed;
      top: 14px;
      right: 74px;
      min-width: 44px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--border-secondary);
      border-radius: 999px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 20;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .install-btn:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .install-btn:hover {
      transform: translateY(-1px);
    }

    .container {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .card {
      background-color: var(--bg-surface);
      border: 1px solid var(--border-primary);
      border-radius: 14px;
      padding: 20px 16px;
      box-shadow: var(--shadow-soft);
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      font-size: 24px;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    .logo span {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .dropzone {
      border: 2px dashed var(--border-secondary);
      border-radius: 12px;
      padding: 28px 14px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      background-color: var(--bg-elevated);
      margin-bottom: 16px;
      touch-action: manipulation;
    }

    .dropzone:hover {
      border-color: var(--text-muted);
      background-color: var(--bg-muted);
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .dropzone.dragover {
      border-color: var(--border-focus);
      background-color: var(--bg-muted);
    }

    .dropzone:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .dropzone-icon {
      width: 42px;
      height: 42px;
      margin: 0 auto 12px;
      opacity: 0.6;
    }

    .dropzone-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--text-primary);
    }

    .dropzone-text {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .dropzone-text strong {
      color: var(--text-primary);
    }

    .dropzone-hint {
      color: var(--text-muted);
      font-size: 11px;
      margin-bottom: 10px;
    }

    .browse-btn {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border-secondary);
      border-radius: 10px;
      background: var(--bg-muted);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 12px;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 0.2s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .browse-btn:hover {
      background: var(--bg-elevated);
      transform: translateY(-1px);
    }

    .browse-btn:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .file-input {
      display: none;
    }

    .file-list {
      margin-bottom: 16px;
      max-height: 180px;
      overflow-y: auto;
    }

    .file-summary {
      margin: 0 0 10px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .file-list::-webkit-scrollbar {
      width: 4px;
    }

    .file-list::-webkit-scrollbar-track {
      background: var(--bg-muted);
      border-radius: 2px;
    }

    .file-list::-webkit-scrollbar-thumb {
      background: var(--border-secondary);
      border-radius: 2px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background-color: var(--bg-muted);
      border-radius: 8px;
      margin-bottom: 6px;
      animation: slideIn 0.2s ease;
      border: 1px solid transparent;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }

    .file-item:hover {
      border-color: var(--border-secondary);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .file-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.6;
    }

    .file-name {
      font-size: 12px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: 6px;
      margin-right: 6px;
    }

    .file-remove {
      background: none;
      border: none;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      padding: 10px;
      opacity: 0.4;
      transition: opacity 0.2s;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .file-remove:hover {
      opacity: 1;
    }

    .file-remove svg {
      width: 16px;
      height: 16px;
      stroke: var(--text-primary);
    }

    .password-field {
      margin-bottom: 16px;
      display: grid;
      gap: 8px;
    }

    .password-label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .password-wrapper {
      position: relative;
    }

    .password-input {
      width: 100%;
      min-height: 44px;
      padding: 12px 42px 12px 12px;
      background-color: var(--bg-elevated);
      border: 1px solid var(--border-secondary);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      transition: transform 0.2s ease, background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
    }

    .password-input:focus {
      outline: none;
      border-color: var(--border-focus);
      background-color: var(--bg-surface);
      box-shadow: 0 0 0 3px var(--focus-ring);
      transform: translateY(-1px);
    }

    .password-input::placeholder {
      color: var(--text-muted);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      padding: 10px;
      opacity: 0.4;
      transition: opacity 0.2s;
      touch-action: manipulation;
    }

    .password-toggle:hover {
      opacity: 0.8;
    }

    .password-toggle svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-primary);
    }

    .upload-btn {
      width: 100%;
      min-height: 44px;
      padding: 14px 16px;
      background-color: var(--text-primary);
      color: var(--bg-primary);
      border: 1px solid var(--text-primary);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, box-shadow 0.3s ease, background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      touch-action: manipulation;
    }

    .upload-btn:focus-visible {
      outline: 2px solid var(--border-focus);
      outline-offset: 2px;
    }

    .upload-btn:hover:not(:disabled) {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      border-color: var(--border-secondary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-lift);
    }

    .upload-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .upload-btn:disabled {
      background-color: var(--bg-muted);
      color: var(--text-muted);
      border-color: var(--border-secondary);
      cursor: not-allowed;
      box-shadow: none;
    }

    .upload-btn.loading {
      background-color: var(--text-primary);
      color: var(--bg-primary);
      pointer-events: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .status-message {
      text-align: center;
      font-size: 12px;
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .status-message.success {
      background-color: var(--bg-muted);
      color: var(--text-primary);
      border: 1px solid var(--border-secondary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .status-message.error {
      background-color: var(--bg-muted);
      color: var(--text-primary);
      border: 1px solid var(--border-secondary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .hidden {
      display: none;
    }

    @media (min-width: 768px) {
      body {
        padding: 24px;
      }

      .theme-toggle {
        top: 18px;
        right: 18px;
      }

      .install-btn {
        top: 18px;
        right: 82px;
      }

      .container {
        max-width: 560px;
      }

      .card {
        border-radius: 16px;
        padding: 32px 28px;
      }

      .logo {
        margin-bottom: 28px;
      }

      .logo h1 {
        font-size: 28px;
      }

      .dropzone {
        padding: 36px 20px;
        margin-bottom: 20px;
      }

      .dropzone-icon {
        width: 48px;
        height: 48px;
        margin: 0 auto 16px;
      }

      .dropzone-text {
        font-size: 14px;
        margin-bottom: 8px;
      }

      .dropzone-hint {
        font-size: 12px;
        margin-bottom: 12px;
      }

      .browse-btn {
        width: auto;
        min-width: 180px;
        padding: 10px 16px;
      }

      .file-list {
        margin-bottom: 20px;
      }

      .file-item {
        padding: 12px 14px;
        margin-bottom: 8px;
      }

      .file-name {
        font-size: 13px;
      }

      .file-size {
        font-size: 12px;
      }

      .password-field {
        margin-bottom: 20px;
        gap: 10px;
      }

      .password-label {
        font-size: 13px;
        margin-bottom: 8px;
      }

      .password-input {
        padding: 14px 48px 14px 16px;
        font-size: 14px;
      }

      .upload-btn {
        padding: 16px 24px;
        font-size: 15px;
      }

      .status-message {
        font-size: 13px;
        margin-top: 16px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <button type="button" class="install-btn hidden" id="installBtn" aria-label="Install app">Install</button>
  <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle theme">Light</button>
  <div class="container">
    <div class="card">
      <div class="logo">
        <h1>zipME<span>in</span></h1>
      </div>

      <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Select files to upload">
        <div class="dropzone-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
        </div>
        <p class="dropzone-text"><strong>Drop files here</strong> or click to browse</p>
        <p class="dropzone-hint">Support for multiple files</p>
        <button type="button" class="browse-btn" id="browseBtn">Choose files</button>
        <input type="file" class="file-input" id="fileInput" multiple>
      </div>

      <p class="file-summary hidden" id="fileSummary"></p>
      <div class="file-list hidden" id="fileList"></div>

      <div class="password-field">
        <label class="password-label" for="password">Encryption Password</label>
        <div class="password-wrapper">
          <input type="password" class="password-input" id="password" placeholder="Enter password to encrypt">
          <button type="button" class="password-toggle" id="passwordToggle">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" id="eyeIcon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.008 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.008-9.963-7.178z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </button>
        </div>
      </div>

      <button class="upload-btn" id="uploadBtn" disabled>Select files to upload</button>

      <div class="status-message hidden" id="statusMessage"></div>
    </div>
  </div>

  <script>
    (function() {
      const THEME_KEY = 'zipmein-theme';
      const dropzone = document.getElementById('dropzone');
      const browseBtn = document.getElementById('browseBtn');
      const fileInput = document.getElementById('fileInput');
      const fileList = document.getElementById('fileList');
      const fileSummary = document.getElementById('fileSummary');
      const passwordInput = document.getElementById('password');
      const passwordToggle = document.getElementById('passwordToggle');
      const uploadBtn = document.getElementById('uploadBtn');
      const statusMessage = document.getElementById('statusMessage');
      const themeToggle = document.getElementById('themeToggle');
      const installBtn = document.getElementById('installBtn');
      const eyeIcon = document.getElementById('eyeIcon');

      let selectedFiles = [];
      let deferredInstallPrompt = null;
      let isUploading = false;

      function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
      }

      function getUploadButtonLabel(fileCount) {
        return fileCount === 0
          ? 'Select files to upload'
          : 'Upload ' + fileCount + ' file' + (fileCount > 1 ? 's' : '');
      }

      function setUploadButtonState() {
        uploadBtn.disabled = isUploading || selectedFiles.length === 0;
        uploadBtn.textContent = getUploadButtonLabel(selectedFiles.length);
      }

      function setUploadingState(uploading) {
        isUploading = uploading;

        if (uploading) {
          uploadBtn.classList.add('loading');
          uploadBtn.disabled = true;
          uploadBtn.innerHTML = '<div class="spinner"></div> Uploading...';
          return;
        }

        uploadBtn.classList.remove('loading');
        setUploadButtonState();
      }

      function renderSelectedFiles() {
        fileList.innerHTML = '';

        if (selectedFiles.length === 0) {
          fileSummary.classList.add('hidden');
          fileSummary.textContent = '';
          fileList.classList.add('hidden');
          setUploadButtonState();
          return;
        }

        fileSummary.textContent = selectedFiles.length + ' file' + (selectedFiles.length > 1 ? 's' : '') + ' selected';
        fileSummary.classList.remove('hidden');
        fileList.classList.remove('hidden');
        setUploadButtonState();

        selectedFiles.forEach((file, index) => {
          const fileItem = document.createElement('div');
          fileItem.className = 'file-item';
          fileItem.innerHTML = 
            '<div class="file-info">' +
              '<svg class="file-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">' +
                '<path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />' +
              '</svg>' +
              '<span class="file-name">' + file.name + '</span>' +
            '</div>' +
            '<span class="file-size">' + formatFileSize(file.size) + '</span>' +
            '<button class="file-remove" data-index="' + index + '">' +
              '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">' +
                '<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />' +
              '</svg>' +
            '</button>';
          fileList.appendChild(fileItem);
        });
      }

      function addFiles(files) {
        if (!files || files.length === 0) {
          return;
        }

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const exists = selectedFiles.some(f => f.name === file.name && f.size === file.size);
          if (!exists) {
            selectedFiles.push(file);
          }
        }
        renderSelectedFiles();
        hideStatus();
      }

      function removeFile(index) {
        if (Number.isNaN(index) || index < 0 || index >= selectedFiles.length) {
          return;
        }
        selectedFiles.splice(index, 1);
        renderSelectedFiles();
      }

      function showStatus(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = 'status-message ' + type;
        statusMessage.classList.remove('hidden');
      }

      function hideStatus() {
        statusMessage.classList.add('hidden');
      }

      function applyTheme(theme) {
        const useLightTheme = theme === 'light';
        document.body.classList.toggle('light-theme', useLightTheme);
        themeToggle.textContent = useLightTheme ? 'Dark' : 'Light';
        themeToggle.setAttribute('aria-label', useLightTheme ? 'Switch to dark theme' : 'Switch to light theme');
      }

      function loadSavedTheme() {
        const savedTheme = localStorage.getItem(THEME_KEY);
        applyTheme(savedTheme === 'light' ? 'light' : 'dark');
      }

      function showInstallButton() {
        installBtn.classList.remove('hidden');
      }

      function hideInstallButton() {
        installBtn.classList.add('hidden');
      }

      function getDownloadFilename(contentDisposition) {
        if (!contentDisposition) {
          return 'uploaded-files.zip';
        }

        const utf8Match = contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);
        if (utf8Match && utf8Match[1]) {
          return decodeURIComponent(utf8Match[1]);
        }

        const plainMatch = contentDisposition.match(/filename="([^"]+)"/i);
        return plainMatch && plainMatch[1] ? plainMatch[1] : 'uploaded-files.zip';
      }

      async function requestUpload() {
        const formData = new FormData();
        selectedFiles.forEach((file) => formData.append('files', file));

        const password = passwordInput.value.trim();
        if (password) {
          formData.append('password', password);
        }

        let response;
        try {
          response = await fetch('/upload', {
            method: 'POST',
            body: formData
          });
        } catch (networkError) {
          throw new Error('Network error. Please check your connection and try again.');
        }

        if (!response.ok) {
          const errorText = await response.text().catch(() => '');
          throw new Error(errorText || 'Upload failed. Please try again.');
        }

        return response;
      }

      function downloadZip(blob, filename) {
        const blobUrl = URL.createObjectURL(blob);
        try {
          const link = document.createElement('a');
          link.href = blobUrl;
          link.download = filename;
          document.body.appendChild(link);
          link.click();
          link.remove();
        } finally {
          URL.revokeObjectURL(blobUrl);
        }
      }

      async function handleUpload() {
        if (selectedFiles.length === 0 || isUploading) {
          return;
        }

        hideStatus();
        setUploadingState(true);

        try {
          const response = await requestUpload();
          const zipBlob = await response.blob();
          if (!zipBlob || zipBlob.size === 0) {
            throw new Error('Received an empty ZIP file.');
          }

          const downloadFilename = getDownloadFilename(response.headers.get('Content-Disposition'));
          downloadZip(zipBlob, downloadFilename);

          showStatus('ZIP downloaded successfully.', 'success');
          selectedFiles = [];
          passwordInput.value = '';
          renderSelectedFiles();
        } catch (error) {
          const message = error instanceof Error ? error.message : 'Upload failed. Please try again.';
          showStatus(message, 'error');
        } finally {
          setUploadingState(false);
        }
      }

      themeToggle.addEventListener('click', () => {
        const isLightTheme = document.body.classList.contains('light-theme');
        const nextTheme = isLightTheme ? 'dark' : 'light';
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      });

      window.addEventListener('beforeinstallprompt', (event) => {
        event.preventDefault();
        deferredInstallPrompt = event;
        showInstallButton();
      });

      installBtn.addEventListener('click', async () => {
        if (!deferredInstallPrompt) {
          return;
        }

        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
        hideInstallButton();
      });

      window.addEventListener('appinstalled', () => {
        deferredInstallPrompt = null;
        hideInstallButton();
      });

      dropzone.addEventListener('click', () => fileInput.click());
      dropzone.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          fileInput.click();
        }
      });
      dropzone.addEventListener('touchend', (e) => {
        e.preventDefault();
        fileInput.click();
      }, { passive: false });
      browseBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        fileInput.click();
      });

      dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });

      dropzone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });

      dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        addFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener('change', (e) => {
        addFiles(e.target.files);
        fileInput.value = '';
      });

      fileList.addEventListener('click', (e) => {
        const removeBtn = e.target.closest('.file-remove');
        if (removeBtn) {
          const index = parseInt(removeBtn.dataset.index);
          removeFile(index);
        }
      });

      passwordToggle.addEventListener('click', () => {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;

        if (type === 'text') {
          eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
        } else {
          eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.64 0 8.577 3.008 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.64 0-8.577-3.008-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
        }
      });

      uploadBtn.addEventListener('click', handleUpload);

      loadSavedTheme();
      renderSelectedFiles();

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {
            // Ignore registration failures in unsupported/private contexts.
          });
        });
      }
    })();
  </script>
</body>
</html>
